<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programmers and software developers lost the plot on naming their tools</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5efe5;
      --surface: rgba(255, 252, 247, 0.92);
      --panel: rgba(255, 255, 255, 0.78);
      --border: rgba(99, 80, 51, 0.16);
      --title: #2d1f12;
      --body: #4a3723;
      --muted: #7d6850;
      --accent: #9a4f19;
      --code-bg: #f3ebe0;
      --quote-bg: #f8f2ea;
      --shadow: 0 22px 60px rgba(88, 54, 18, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top left, rgba(202, 120, 48, 0.22), transparent 34%),
        radial-gradient(circle at top right, rgba(138, 95, 54, 0.14), transparent 30%),
        linear-gradient(180deg, #fbf7f1 0%, var(--bg) 100%);
      color: var(--body);
      font-family: "PingFang SC", "Hiragino Sans GB", "Noto Serif CJK SC",
        "Source Han Serif SC", "Songti SC", serif;
      line-height: 1.85;
    }

    body {
      padding: 40px 20px 64px;
    }

    main {
      width: min(860px, 100%);
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 48px 56px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    h1, h2, h3, h4, h5, h6 {
      color: var(--title);
      font-family: "PingFang SC", "SF Pro Display", sans-serif;
      line-height: 1.3;
      letter-spacing: 0.01em;
      margin: 1.7em 0 0.65em;
    }

    h1 {
      font-size: 2rem;
      margin-top: 0;
    }

    h2 {
      font-size: 1.55rem;
      padding-top: 1.1rem;
      border-top: 1px solid rgba(154, 79, 25, 0.10);
    }

    p, ul, ol, blockquote, pre {
      margin: 1em 0;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(154, 79, 25, 0.24);
    }

    strong {
      color: var(--title);
      font-weight: 700;
    }

    code {
      font-family: "SF Mono", "JetBrains Mono", monospace;
      background: var(--code-bg);
      border-radius: 6px;
      padding: 0.15em 0.4em;
      font-size: 0.92em;
    }

    pre {
      background: #20150c;
      color: #f8f3ed;
      padding: 18px 20px;
      border-radius: 16px;
      overflow-x: auto;
    }

    pre code {
      background: transparent;
      color: inherit;
      padding: 0;
    }

    blockquote {
      margin-left: 0;
      padding: 18px 22px;
      background: var(--quote-bg);
      border-left: 4px solid rgba(154, 79, 25, 0.48);
      border-radius: 16px;
      color: var(--muted);
    }

    ul, ol {
      padding-left: 1.4rem;
    }

    li + li {
      margin-top: 0.45rem;
    }

    hr {
      border: none;
      border-top: 1px solid rgba(154, 79, 25, 0.18);
      margin: 2rem 0;
    }

    img {
      display: block;
      max-width: 100%;
      border-radius: 18px;
      margin: 1.5rem auto;
      box-shadow: 0 16px 30px rgba(48, 26, 4, 0.12);
    }

    @media (max-width: 720px) {
      body {
        padding: 18px 12px 30px;
      }

      main {
        padding: 28px 22px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <main>
    
  </main>
</body>
</html>
